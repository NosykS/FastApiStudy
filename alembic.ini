[alembic]
# Шлях до папки з міграціями
script_location = alembic

# Формат назви файлу: дата_час_хеш_назва.py (дуже зручно для сортування)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Додаємо корінь проєкту до sys.path для коректних імпортів
prepend_sys_path = .
path_separator = os

# Налаштування відступів та кодування
output_encoding = utf-8

# Цей параметр ми ігноруємо в env.py, але залишаємо як заглушку
sqlalchemy.url = postgresql://user:pass@localhost/dbname

[post_write_hooks]
# Якщо у тебе встановлено 'ruff' або 'black', Alembic автоматично підправить стиль коду міграції
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/Scripts/ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# --- Налаштування логування ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S