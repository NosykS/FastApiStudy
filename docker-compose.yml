services:
  # Наш FastAPI додаток
  app:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - fast-api-net

  # База даних MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fast-api-net

networks:
  fast-api-net:
    driver: bridge

volumes:
  mongo_data: